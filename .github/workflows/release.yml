name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle
      - name: Build and test harness
        working-directory: evals/harness
        run: ./gradlew clean test installDist
      - name: Validate repository and case catalog
        shell: bash
        run: |
          repo="$PWD"
          work="$RUNNER_TEMP/cda-release-validation"
          cli="evals/harness/build/install/cda-evals/bin/cda-evals"
          "$cli" validate --skill-root "$repo" --work-dir "$work"
          "$cli" list-cases
          test -f evals/published/README.md
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_args=(
            "$GITHUB_REF_NAME"
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME"
            --notes-file "docs/releases/$GITHUB_REF_NAME.md"
          )
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            release_args+=(--prerelease)
          fi
          gh release create "${release_args[@]}"
