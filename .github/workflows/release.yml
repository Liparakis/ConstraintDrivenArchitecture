name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle
      - name: Build and test harness
        working-directory: evals/harness
        run: ./gradlew clean test installDist
      - name: Package harness
        shell: bash
        run: |
          artifact="$RUNNER_TEMP/cda-evals-${GITHUB_REF_NAME}.tar.gz"
          tar -czf "$artifact" -C evals/harness/build/install cda-evals
          sha256sum "$artifact" > "$artifact.sha256"
          echo "artifact=$artifact" >> "$GITHUB_ENV"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "$artifact" "$artifact.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
